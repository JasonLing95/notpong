name: Publish to PyPI

# This tells GitHub to run this workflow whenever you publish a new Release
on:
  release:
    types: [published]
  # Allows you to also trigger this manually from the Actions tab
  workflow_dispatch: 

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Build the package
        run: uv build

      - name: Publish to PyPI
        run: uv publish
        env:
          # This securely pulls your PyPI token from GitHub Secrets
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_TOKEN }}